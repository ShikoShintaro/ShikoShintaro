name: Generate Snakes

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snakes
        uses: Platane/snk@v3
        with:
          github_user_name: ShikoShintaro
          outputs: |
            dist/snake-green.svg?palette=github
            dist/snake-cyan.svg?palette=github-dark&color_snake=cyan
            dist/snake-purple.svg?palette=github-dark&color_snake=purple

      - name: Push snakes
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
