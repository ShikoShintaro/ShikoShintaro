name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate neon red snake
        uses: Platane/snk@v3
        with:
          github_user_name: ShikoShintaro
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=ff0000&color_dots=ff0000,ff4d4d,ff8080,ffb3b3

      - name: Push snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
